<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Monitoring Sensor Ultrasonik</title>
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">
    <h2>Monitoring Sensor Ketinggian Air</h2>

    <div class="dashboard-grid">
        <div class="card">
            <h3>Grafik Historis Ketinggian Air</h3>
            <canvas id="rainChart"></canvas>
        </div>

        <div class="card summary-card">
            <div class="stat-group">
                <span class="stat-label">Waktu Data Terakhir</span>
                <span class="stat-value" id="current-time">Memuat...</span>
            </div>

            <div class="stat-group">
                <span class="stat-label">Distance 1</span>
                <div class="highlight-value" id="current-distance">- <small style="font-size: 1rem;">cm</small></div>
                <div class="status-badge" id="status-badge">Memuat...</div>
            </div>

            <div style="display: flex; justify-content: space-between;">
                <div>
                    <span class="stat-label">Distance 1</span>
                    <span class="stat-value" id="distance1-value">-</span>
                </div>
                <div>
                    <span class="stat-label">Distance 2</span>
                    <span class="stat-value" id="distance2-value">-</span>
                </div>
            </div>

            <div class="legend">
                <strong>Keterangan:</strong><br>
                <span class="dot green"></span> Aman <br>
                <span class="dot yellow"></span> Waspada <br>
                <span class="dot red"></span> Siaga
            </div>
        </div>
    </div>
</div>

<script src="main.js"></script>

</body>
</html>
